api_version: v1

servers:
  notion:
    description: Official Notion hosted MCP server for user-authorized workspace access over remote streamable HTTP.
    type: remote
    remote:
      protocol: streamable_http
      url: "https://mcp.notion.com/mcp"
    targets:
      - claude
      - codex-package
      - gemini
      - opencode
      - cursor
