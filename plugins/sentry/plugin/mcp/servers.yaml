api_version: v1

servers:
  sentry:
    description: Official Sentry hosted MCP server for debugging, issues, traces, and incident workflows over remote streamable HTTP.
    type: remote
    remote:
      protocol: streamable_http
      url: "https://mcp.sentry.dev"
    targets:
      - claude
      - codex-package
      - gemini
      - opencode
      - cursor
