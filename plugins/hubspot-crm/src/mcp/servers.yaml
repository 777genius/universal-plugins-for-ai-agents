api_version: v1

servers:
  hubspot-crm:
    description: Official HubSpot remote MCP server for CRM records, tickets, reporting, and account workflows.
    type: remote
    remote:
      protocol: streamable_http
      url: "https://mcp.hubspot.com"
    targets:
      - claude
      - codex-package
      - gemini
      - opencode
      - cursor
