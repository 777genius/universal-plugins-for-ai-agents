api_version: v1

servers:
  heroku:
    description: Official Heroku hosted MCP server for apps, pipelines, logs, add-ons, and platform operations over remote streamable HTTP.
    type: remote
    remote:
      protocol: streamable_http
      url: "https://mcp.heroku.com/mcp"
    targets:
      - claude
      - codex-package
      - gemini
      - opencode
      - cursor
