api_version: v1

servers:
  cloudflare-observability:
    description: Official Cloudflare hosted observability MCP server for logs and analytics over remote streamable HTTP.
    type: remote
    remote:
      protocol: streamable_http
      url: "https://observability.mcp.cloudflare.com/mcp"
    targets:
      - claude
      - codex-package
      - gemini
      - opencode
      - cursor
