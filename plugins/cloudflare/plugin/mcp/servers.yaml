api_version: v1

servers:
  cloudflare-api:
    description: Official Cloudflare API hosted MCP server for token-efficient Cloudflare API access over remote streamable HTTP.
    type: remote
    remote:
      protocol: streamable_http
      url: "https://mcp.cloudflare.com/mcp"
    targets:
      - claude
      - codex-package
      - gemini
      - opencode
      - cursor
