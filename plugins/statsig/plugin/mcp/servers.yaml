api_version: v1

servers:
  statsig:
    description: Official Statsig hosted MCP server for authenticated access to experiments, gates, configs, metrics, and console workflows over remote streamable HTTP.
    type: remote
    remote:
      protocol: streamable_http
      url: "https://api.statsig.com/v1/mcp"
    targets:
      - claude
      - codex-package
      - gemini
      - opencode
      - cursor
